version: "3.8"

services:
  nginx:
    container_name: nginx
    build: ./nginx
    image: nginx:rhamini
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - ludo
    healthcheck:
      test: ["CMD-SHELL", "curl -kfsS https://localhost/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  postgres:
    container_name: postgres
    build: ./db
    image: postgres:rhamini
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgresql:/var/lib/postgresql/data
    networks:
      - ludo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    container_name: backend
    build:
      context: ./backend
      target: dev
    image: backend:rhamini
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ludo
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/ping',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: dev
    image: frontend:rhamini
    environment:
      VITE_API_URL: https://localhost/api
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - ludo
    healthcheck:
      # Vite répond 200/304, mais selon config ça peut répondre 404 sur / => on accepte <500
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

volumes:
  postgresql:
  frontend_node_modules:
    name: frontend_node_modules
  backend_node_modules:
    name: backend_node_modules
  backend_uploads:
    name: backend_uploads

networks:
  ludo:
    driver: bridge
